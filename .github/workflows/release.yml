name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  # 构建 macOS 版本（Universal - 同时支持 Intel 和 Apple Silicon）
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Install Apple certificates (optional)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        if: env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE != null
        run: |
          echo "$APPLE_CERTIFICATE" | base64 -d > certificate.p12
          security create-keychain -p "actions" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "actions" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "actions" build.keychain

      - name: Build Tauri Universal Binary
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          pnpm tauri build --target universal-apple-darwin
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # 构建 Windows 版本
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri Windows
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # 构建 Linux 版本
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri Linux
        run: pnpm tauri build

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/AppImage/*.AppImage

  # 将构建产物发布到公开仓库 Hakim-Fan/Aura-release
  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          if [ -d "artifacts" ]; then
            echo "=== Artifacts directory contents ==="
            find artifacts -type f -print
          else
            echo "::error::No artifacts found — build jobs may have failed"
            exit 1
          fi

      - name: Publish Release to public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          TAG_NAME="${{ github.event.inputs.version || github.ref_name }}"
          PUBLIC_REPO="Hakim-Fan/Aura-release"

          # 如果该版本的 release 已存在，先删除
          gh release delete "${TAG_NAME}" --repo "${PUBLIC_REPO}" --yes 2>/dev/null || true

          # 创建 draft release
          gh release create "${TAG_NAME}" \
            --repo "${PUBLIC_REPO}" \
            --title "Aura ${TAG_NAME}" \
            --draft \
            --notes "## Aura ${TAG_NAME}

          ### Downloads
          Choose the installer for your platform:
          - **macOS** (Universal): \`.dmg\`
          - **Windows**: \`.msi\` or \`.exe\`
          - **Linux**: \`.deb\` or \`.AppImage\`"

          # 上传所有产物
          find artifacts -type f -exec gh release upload "${TAG_NAME}" --repo "${PUBLIC_REPO}" {} +

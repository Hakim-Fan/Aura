name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  # 解决 macOS runners 上 Cargo 获取注册表可能出现的网络超时问题
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # 构建 macOS 版本
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            node_arch: arm64
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            node_arch: x64
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          architecture: ${{ matrix.node_arch }}
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App
        run: |
          pnpm tauri build --target ${{ matrix.target }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  # 构建 Windows 版本
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri Windows
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # 构建 Linux 版本
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri Linux
        run: pnpm tauri build

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/AppImage/*.AppImage

  # 将构建产物发布到公开仓库 Hakim-Fan/Aura-release
  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          if [ -d "artifacts" ]; then
            echo "=== Artifacts directory contents ==="
            find artifacts -type f -print
          else
            echo "::error::No artifacts found — build jobs may have failed"
            exit 1
          fi

      - name: Publish Release to public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          TAG_NAME="${{ github.event.inputs.version || github.ref_name }}"
          PUBLIC_REPO="Hakim-Fan/Aura-release"

          # 如果该版本的 release 已存在，先删除
          gh release delete "${TAG_NAME}" --repo "${PUBLIC_REPO}" --yes 2>/dev/null || true

          # 使用 RELEASE_NOTES.md 作为发布说明，自动发布（非 draft）
          if [ -f "RELEASE_NOTES.md" ]; then
            gh release create "${TAG_NAME}" \
              --repo "${PUBLIC_REPO}" \
              --title "Aura ${TAG_NAME}" \
              --notes-file "RELEASE_NOTES.md"
          else
            gh release create "${TAG_NAME}" \
              --repo "${PUBLIC_REPO}" \
              --title "Aura ${TAG_NAME}" \
              --notes "Aura ${TAG_NAME} released."
          fi

          # 上传所有产物
          find artifacts -type f -exec gh release upload "${TAG_NAME}" --repo "${PUBLIC_REPO}" {} +

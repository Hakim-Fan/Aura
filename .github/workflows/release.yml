name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  # 综合防范各类网络超时和 DNS 解析失效等问题
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
  CARGO_HTTP_TIMEOUT: "120"

jobs:
  # 构建 macOS 版本
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            node_arch: arm64
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            node_arch: x64
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          architecture: ${{ matrix.node_arch }}
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Fetch Rust dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            cargo fetch --manifest-path src-tauri/Cargo.toml --locked --target ${{ matrix.target }} && exit 0
            if [ "$attempt" -eq 3 ]; then
              echo "cargo fetch failed after ${attempt} attempts"
              exit 1
            fi
            echo "cargo fetch failed on attempt ${attempt}; retrying in 15 seconds..."
            sleep 15
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App
        run: |
          pnpm sync:version
          for attempt in 1 2; do
            pnpm tauri build --target ${{ matrix.target }} && exit 0
            status=$?
            echo "macOS DMG build failed on attempt ${attempt}"
            if [ -f "src-tauri/target/${{ matrix.target }}/release/bundle/dmg/bundle_dmg.sh" ]; then
              echo "=== bundle_dmg.sh ==="
              sed -n '1,240p' "src-tauri/target/${{ matrix.target }}/release/bundle/dmg/bundle_dmg.sh"
            fi
            echo "=== hdiutil info ==="
            hdiutil info || true
            if [ "$attempt" -eq 2 ]; then
              exit "$status"
            fi
            echo "Retrying macOS DMG build in 20 seconds..."
            sleep 20
          done
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig

  # 构建 Windows 版本
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Fetch Rust dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            cargo fetch --manifest-path src-tauri/Cargo.toml --locked --target ${{ matrix.target }} && exit 0
            if [ "$attempt" -eq 3 ]; then
              echo "cargo fetch failed after ${attempt} attempts"
              exit 1
            fi
            echo "cargo fetch failed on attempt ${attempt}; retrying in 15 seconds..."
            sleep 15
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Windows ARM64 Node sidecar
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          $nodeVersion = node -p "process.version"
          $archiveName = "node-$nodeVersion-win-arm64.zip"
          $downloadUrl = "https://nodejs.org/dist/$nodeVersion/$archiveName"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $archiveName
          Expand-Archive -Path $archiveName -DestinationPath node-win-arm64
          $nodeExe = Get-ChildItem -Path node-win-arm64 -Recurse -Filter node.exe | Select-Object -First 1
          if (-not $nodeExe) {
            throw "Failed to find ARM64 node.exe in $archiveName"
          }
          "AURA_NODE_BINARY=$($nodeExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build Tauri Windows
        run: |
          pnpm sync:version
          pnpm tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig

  # 构建 Linux 版本
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Fetch Rust dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            cargo fetch --manifest-path src-tauri/Cargo.toml --locked && exit 0
            if [ "$attempt" -eq 3 ]; then
              echo "cargo fetch failed after ${attempt} attempts"
              exit 1
            fi
            echo "cargo fetch failed on attempt ${attempt}; retrying in 15 seconds..."
            sleep 15
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri Linux
        run: |
          pnpm sync:version
          pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/AppImage/*.AppImage
            src-tauri/target/release/bundle/**/*.tar.gz
            src-tauri/target/release/bundle/**/*.sig

  # 将构建产物发布到当前仓库 Release
  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          if [ -d "artifacts" ]; then
            echo "=== Artifacts directory contents ==="
            find artifacts -type f -print
          else
            echo "::error::No artifacts found — build jobs may have failed"
            exit 1
          fi

      - name: Create updater manifest
        run: |
          TAG_NAME="${{ github.event.inputs.version || github.ref_name }}"
          node scripts/create-updater-latest-json.mjs artifacts "${TAG_NAME}" "${GITHUB_REPOSITORY}" RELEASE_NOTES.md

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.event.inputs.version || github.ref_name }}"

          # 如果该版本的 release 已存在，先删除
          gh release delete "${TAG_NAME}" --yes 2>/dev/null || true

          # 使用 RELEASE_NOTES.md 作为发布说明，自动发布（非 draft）
          if [ -f "RELEASE_NOTES.md" ]; then
            gh release create "${TAG_NAME}" \
              --title "Aura ${TAG_NAME}" \
              --notes-file "RELEASE_NOTES.md"
          else
            gh release create "${TAG_NAME}" \
              --title "Aura ${TAG_NAME}" \
              --notes "Aura ${TAG_NAME} released."
          fi

          # 上传安装包、updater 包和 latest.json
          find artifacts/release-assets -type f -exec gh release upload "${TAG_NAME}" {} +

<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura</title>
  <style>
    /* ===== Anti-FOUC Core ===== */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'SF Pro Display', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #root {
      height: 100%;
      opacity: 0;
      transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #root.ready {
      opacity: 1;
    }

    /* ===== Splash Loader ===== */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: splash-enter 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Orbital spinner — premium feel */
    .orbital-spinner {
      position: relative;
      width: 44px;
      height: 44px;
    }
    .orbital-spinner .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid transparent;
    }
    .orbital-spinner .ring-1 {
      border-top-color: #4f7b74;
      animation: orbit 1.1s cubic-bezier(0.5, 0.15, 0.5, 0.85) infinite;
    }
    .orbital-spinner .ring-2 {
      inset: 5px;
      border-right-color: rgba(79, 123, 116, 0.35);
      animation: orbit 1.6s cubic-bezier(0.5, 0.15, 0.5, 0.85) infinite reverse;
    }
    .orbital-spinner .ring-3 {
      inset: 10px;
      border-bottom-color: rgba(79, 123, 116, 0.15);
      animation: orbit 2.2s linear infinite;
    }

    .splash-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9ca3af;
      animation: breathe 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes orbit {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }
    @keyframes splash-enter {
      0% {
        opacity: 0;
        transform: scale(0.92) translateY(8px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
  </style>
</head>

<body>
  <!-- Splash Screen: renders instantly, independent of React/UnoCSS -->
  <div id="splash">
    <div class="splash-content">
      <div class="orbital-spinner">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
      </div>
      <div class="splash-label">Aura</div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    var SPLASH_BORN = Date.now();

    /**
     * Call this once the app is fully hydrated & painted.
     * Enforces a minimum display time so Vite's async CSS injection
     * has settled before we reveal the real UI.
     */
    window.__dismissSplash = function () {
      var MIN_MS = 800;
      var elapsed = Date.now() - SPLASH_BORN;
      var wait = Math.max(0, MIN_MS - elapsed);

      setTimeout(function () {
        // Double-rAF: guarantees browser has completed layout + paint
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            var root = document.getElementById('root');
            var splash = document.getElementById('splash');
            if (root) root.classList.add('ready');
            if (splash) {
              splash.classList.add('fade-out');
              setTimeout(function () { splash.remove(); }, 600);
            }
          });
        });
      }, wait);
    };
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
